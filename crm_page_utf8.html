<script>
    const MODAL_LG = '#myModal';
    const MODAL_XL = '#myModalXl';
    document.loading = 'Loading...';
    const dropifyMessages = {
        default: "Choose a file",
        replace: "Drop a file or click to replace",
        remove: "Remove",
        error: "Some error occurred.",
    };

    function checkboxChange(checkboxClass, hiddenFieldId) {
        const selectedValues = $(`.${checkboxClass} input:checked`).map(function() {
            return $(this).val();
        }).get();

        $(`#${hiddenFieldId}`).val(selectedValues.join(','));
    }

    $(window).on('load', function () {
        // Animate loader off screen
        init();
        $(".preloader-container").fadeOut("slow", function () {
            $(this).removeClass("d-flex");
        });
    });

    const datepickerConfig = {
        formatter: (input, date, instance) => {
            input.value = moment(date).format('DD-MM-YYYY')
        },
        showAllDates: true,
        customDays: ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"],
        customMonths: ["January","February","March","April","May","June","July","August","September","October","November","December"],
        customOverlayMonths: ["January","February","March","April","May","June","July","August","September","October","November","December"],
        overlayButton: "Submit",
        overlayPlaceholder: "4-digit year",
        startDay: parseInt("1")
    };
</script>
<script>

    $('.custom-date-picker').each(function (ind, el) {
        datepicker(el, {
            position: 'bl',
            ...datepickerConfig
        });
    });

    $(".select-picker").selectpicker();

    $('#save-form').click(function () {
        $.easyAjax({
            url: "https://crm.alphabusi.com/lead-form/leadStore",
            container: '#createLead',
            type: "POST",
            redirect: true,
            disableButton: true,
            file: true,
            blockUI: true,
            data: $('#createLead').serialize(),
            success: function (response) {
                if (response.status == "success") {
                    $('#createLead')[0].reset();
                    $('#createLead').hide();
                    $('#success-message').html(response.message);
                    $('#success-message').show();
                }
            }
        })
    });

</script>

    <script src="https://www.google.com/recaptcha/api.js?onload=onloadCallback&render=explicit"
            async defer></script>
    <script>
        var gcv3;
        var onloadCallback = function () {
            // Renders the HTML element with id 'captcha_container' as a reCAPTCHA widget.
            // The id of the reCAPTCHA widget is assigned to 'gcv3'.
            gcv3 = grecaptcha.render('captcha_container', {
                'sitekey': '6LeiP8wsAAAAABtE-2mKghtDVWTGKRKS3ZiMg4cI',
                'theme': 'light',
                'callback': function (response) {
                    if (response) {
                        $('#g_recaptcha').val(response);
                    }
                },
            });
        };
    </script>
